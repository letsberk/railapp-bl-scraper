# nixpacks.toml – Railway Konfiguration für Playwright
# In das GitHub-Repo legen (gleiche Ebene wie betrieblive_scraper.py)

[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "cups", "dbus",
           "libdrm", "xorg.libX11", "xorg.libXcomposite",
           "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes",
           "xorg.libXrandr", "mesa", "alsa-lib", "pango", "cairo",
           "expat", "at-spi2-core", "at-spi2-atk", "gtk3"]

[phases.install]
cmds = [
  "pip install -r requirements_bl.txt",
  "playwright install chromium"
]

[start]
cmd = "python betrieblive_scraper.py"
